<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Currency Converter</title>
    <meta name="description" content="Accurate real-time global currency converter built with HTML, CSS, and JS.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="converter-wrapper">
        <header>
            <h1>Currency Converter</h1>
            <p>Real-time accurate exchange rates</p>
        </header>
        
        <section class="converter-body">
            <div class="input-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" value="1" min="0" step="any">
            </div>

            <div class="currency-group">
                <div class="select-box">
                    <label for="from-currency">From</label>
                    <select id="from-currency" aria-label="From Currency">
                        <!-- Options will be populated dynamically -->
                    </select>
                </div>
                
                <button id="swap-btn" class="swap-btn" aria-label="Swap currencies" title="Swap Currencies">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 16V4M7 4L3 8M7 4L11 8M17 8V20M17 20L21 16M17 20L13 16"/>
                    </svg>
                </button>

                <div class="select-box">
                    <label for="to-currency">To</label>
                    <select id="to-currency" aria-label="To Currency">
                        <!-- Options will be populated dynamically -->
                    </select>
                </div>
            </div>

            <div class="result-container" aria-live="polite">
                <p class="rate-info" id="rate-info">Getting exchange rate...</p>
                <h2 class="final-result" id="final-result">0.00</h2>
            </div>
            
            <button id="convert-btn" class="convert-btn">Convert Currency</button>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
